name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dotnet:
    name: .NET build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet restore SpanSight.slnx
      - run: dotnet format SpanSight.slnx --verify-no-changes --no-restore
      - run: dotnet build SpanSight.slnx --no-restore --configuration Release
      - run: dotnet test SpanSight.slnx --no-build --configuration Release

  web:
    name: Web lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  bicep:
    name: Bicep lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Compile only — linter diagnostics surface here; nothing is deployed from CI.
      # deploy.yml (OIDC to Azure) is Week 5 scope.
      - run: az bicep build --file infra/main.bicep --stdout > /dev/null

  # TODO: dependency + container scanning (working conventions, IMPLEMENTATION-PLAN §3) —
  # follow-up once there is a container image to scan; NuGet audit already fails the
  # dotnet build on known-vulnerable packages (NU1903 + TreatWarningsAsErrors).
